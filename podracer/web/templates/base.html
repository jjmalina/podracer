<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}podracer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    function getSystemTheme() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function getTheme() { return localStorage.getItem('theme') || getSystemTheme(); }
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      var el = document.getElementById('theme-toggle');
      if (el) el.innerHTML = t === 'dark'
        ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
        : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
    function toggleTheme() {
      var t = getTheme() === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', t);
      applyTheme(t);
    }
    applyTheme(getTheme());
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
      if (!localStorage.getItem('theme')) applyTheme(getSystemTheme());
    });
    document.addEventListener('DOMContentLoaded', function() { applyTheme(getTheme()); });
  </script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <nav class="container">
      <ul>
        <li><a class="brand" href="/"><span class="brand-mark">//</span>PODRACER</a></li>
      </ul>
      <ul>
        <li><a href="/">Feed</a></li>
        <li><a href="/podcasts">Podcasts</a></li>
        <li><a href="/search">Search</a></li>
        <li><a href="/jobs">Jobs</a></li>
        <li><button id="theme-toggle" class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme"></button></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="container">
      <span><span class="brand-mark">//</span>PODRACER</span>
      <span>Local-first podcast archive</span>
    </div>
  </footer>
</body>
</html>
