[general]
db_path = "./data/podracer.db"
media_dir = "./data/media/"

[transcribe]
backend = "deepgram"           # "deepgram" (cloud) or "whisperx-http" (self-hosted)
deepgram_model = "nova-3"      # nova-3, nova-2, etc.
whisperx_model = "small"       # tiny/base/small/medium/large (used by whisper service)
device = "cuda"                # used by whisper service
compute_type = "float16"       # used by whisper service
diarize = true
# service_url = "http://gpu-host:9000"
# service_auth_token = "..."

# [whisper_service]
# host = "0.0.0.0"
# port = 9000
# auth_token = "..."

[summarize]
backend = "openrouter"
model = "deepseek/deepseek-v4-flash"

# API keys can go here or in .credentials/ files or env vars.
# Priority: env vars > config.toml > .credentials/ files
# [keys]
# hf_token = "hf_..."
# openrouter_api_key = "sk-or-..."
# podcast_index_key = "..."
# podcast_index_secret = "..."
