[general]
db_path = "./data/podracer.db"
media_dir = "./data/media/"

[transcribe]
backend = "whisperx-http"
deepgram_model = "nova-3"
whisperx_model = "large-v3"
device = "cuda"
compute_type = "float16"
diarize = true
service_url = "http://127.0.0.1:9000"

# [whisper_service]
# host = "0.0.0.0"
# port = 9000
# auth_token = "..."

[summarize]
backend = "openrouter"
model = "deepseek/deepseek-v4-flash"

# API keys can go here or in .credentials/ files or env vars.
# Priority: env vars > config.toml > .credentials/ files
# [keys]
# hf_token = "hf_..."
# openrouter_api_key = "sk-or-..."
# podcast_index_key = "..."
# podcast_index_secret = "..."
