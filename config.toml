[general]
db_path = "./data/podracer.db"
media_dir = "./data/media/"

[transcribe]
backend = "deepgram"           # "whisperx" (local GPU) or "deepgram" (cloud)
whisperx_model = "small"       # tiny/base/small/medium/large
deepgram_model = "nova-3"      # nova-3, nova-2, etc.
device = "cuda"                # whisperx only
compute_type = "float16"       # whisperx only
diarize = true

[summarize]
backend = "openrouter"
model = "deepseek/deepseek-v4-flash"

# API keys can go here or in .credentials/ files or env vars.
# Priority: env vars > config.toml > .credentials/ files
# [keys]
# hf_token = "hf_..."
# openrouter_api_key = "sk-or-..."
# podcast_index_key = "..."
# podcast_index_secret = "..."
