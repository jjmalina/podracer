name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      # Slim install — no whisper extra. Tests mock external calls so
      # torch/whisperx aren't needed.
      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check podracer/ tests/

      - name: Type check
        run: uv run ty check podracer/

      - name: Tests
        run: uv run pytest
